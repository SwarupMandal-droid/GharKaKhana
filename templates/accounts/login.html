{% extends 'base.html' %}
{% block title %}Sign In — GharKhana{% endblock %}

{% block content %}
<div class="auth-page animate-fade">
  <div class="card auth-card">

    <div class="auth-logo">🛵</div>
    <h2 style="font-size: 2rem; margin-bottom: 8px;">Welcome back</h2>
    <p class="auth-tagline">Sign in to your GharKhana account</p>

    <form method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}

      <div class="form-group" style="text-align: left;">
        <label class="form-label">Email address</label>
        <input
          type="email"
          name="email"
          class="form-input"
          placeholder="name@example.com"
          required
          autofocus
        />
      </div>

      <div class="form-group" style="text-align: left;">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-primary btn-full" style="margin-top: 12px; height: 52px; font-size: 1rem;">
        Sign in
      </button>
    </form>

    <div class="auth-divider">or continue with</div>

    <p style="text-align: center; font-size: 0.95rem; color: var(--p-gray-500);">
      New to GharKhana?
      <a href="{% url 'accounts:register' %}" style="color: var(--p-orange); font-weight: 700;">
        Create account
      </a>
    </p>

  </div>
</div>
{% endblock %}
